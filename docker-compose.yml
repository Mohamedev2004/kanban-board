version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: kanban_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASS:-postgres}
      POSTGRES_DB: ${DB_NAME:-kanban_db}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - kanban_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-kanban_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # Backend Service (Go/Gin)
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: kanban_backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Database
      DB_USER: ${DB_USER:-postgres}
      DB_PASS: ${DB_PASS:-postgres}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-kanban_db}
      
      # Server
      PORT: 8080
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      
      # JWT
      JWT_SECRET: ${JWT_SECRET:-8f4d9c2e7b1a5f6d3c8e9f0a2b4c6d8e1f3a5b7c9d2e4f6}
      JWT_ACCESS_EXPIRY_MINUTES: ${JWT_ACCESS_EXPIRY_MINUTES:-15}
      JWT_REFRESH_EXPIRY_DAYS: ${JWT_REFRESH_EXPIRY_DAYS:-7}
      
      # Mail
      MAIL_HOST: ${MAIL_HOST:-smtp.sendgrid.net}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-apikey}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_ENCRYPTION: ${MAIL_ENCRYPTION:-tls}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-you@example.com}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-Kanban}
      
      # Cookies
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      COOKIE_HTTP_ONLY: ${COOKIE_HTTP_ONLY:-true}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-}
      COOKIE_SAMESITE: ${COOKIE_SAMESITE:-Lax}
    
    ports:
      - "8080:8080"
    networks:
      - kanban_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 2
      start_period: 2s
    restart: unless-stopped

  # Frontend Service (React/Nginx) - NO backend dependency!
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: kanban_frontend
    # REMOVED: depends_on: - backend
    # Now starts in parallel with backend for faster startup
    ports:
      - "5173:5173"
    networks:
      - kanban_network
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5173/"]
      interval: 30s
      timeout: 5s
      retries: 2
      start_period: 2s
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  kanban_network:
    driver: bridge
